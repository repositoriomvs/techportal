[phases.setup]
nixPkgs = ["php83", "php83Extensions.intl", "php83Extensions.pdo", "php83Extensions.pdo_pgsql", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.curl", "php83Extensions.zip", "php83Extensions.gd", "php83Extensions.bcmath", "composer"]

[phases.install]
cmds = ["composer install --optimize-autoloader --no-scripts --no-interaction"]

[phases.build]
cmds = ["npm install", "npm run build"]

[phases.deploy]
cmds = ["php artisan migrate --force", "php artisan storage:link", "php artisan config:cache", "php artisan view:clear"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"